<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дракончик Сем — Твій друг!</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
            font-family: 'Comic Sans MS', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        #character {
            font-size: 100px;
            margin: 10px 0;
            transition: transform 0.3s ease;
        }

        .bounce {
            animation: bounce 0.5s infinite alternate;
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-10px); }
        }

        #bubble {
            background: #fff;
            border: 3px solid #6c5ce7;
            border-radius: 20px;
            padding: 15px;
            position: relative;
            margin-bottom: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #2d3436;
        }

        #target-image {
            font-size: 90px;
            background: #dfe6e9;
            width: 160px;
            height: 160px;
            line-height: 160px;
            border-radius: 50%;
            margin: 0 auto 20px auto;
            border: 5px solid #00cec9;
        }

        .mic-btn {
            background: #10ac84;
            border: none;
            border-radius: 50%;
            width: 95px;
            height: 95px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            outline: none;
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .mic-btn::before {
            content: "🎤";
            font-size: 40px;
        }

        .speaking { background: #10ac84 !important; }

        .listening {
            background: #ff6b6b !important;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0 { box-shadow: 0 0 0 0 rgba(255, 107, 107, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(255, 107, 107, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 107, 107, 0); }
        }

        #result-text {
            margin-top: 15px;
            font-size: 0.95rem;
            color: #57606f;
            min-height: 20px;
            font-weight: bold;
            word-break: break-word;
        }
    </style>
</head>
<body>

<div class="game-container">
    <div id="bubble">Привіт! Натисни мікрофон — розбуди Семика! 🐉</div>
    <div id="character">🐉</div> 
    
    <div id="target-image">🌟</div>
    
    <button class="mic-btn" id="mic-button" onclick="initAndStart()"></button>
    <div id="result-text">Очікування натискання...</div>
</div>

<script>
    const steps = [
        { image: "🍎", question: "Що це смачненьке? Це яблуко?", keywords: ["яблуко", "яблучко", "ням", "апл"] },
        { image: "🍌", question: "Ой, а що це жовтеньке? Банан?", keywords: ["банан", "бананчик", "нана"] },
        { image: "🚗", question: "Поїхали! Що це? Авто?", keywords: ["машина", "бібіка", "авто", "машинка"] },
        { image: "🐶", question: "Хто це каже гав-гав? Песик?", keywords: ["собака", "песик", "гав", "собачка"] }
    ];

    let currentStep = 0;
    let gameStarted = false;
    let recognition = null;
    const synth = window.speechSynthesis;

    const bubble = document.getElementById('bubble');
    const character = document.getElementById('character');
    const targetImage = document.getElementById('target-image');
    const micButton = document.getElementById('mic-button');
    const resultText = document.getElementById('result-text');

    // Крок 1: Ініціалізація СТРИГО ПІСЛЯ КЛІКУ КОРИСТУВАЧА
    function initAndStart() {
        // Активуємо аудіо-контекст для мобільних браузерів
        if (window.AudioContext || window.webkitAudioContext) {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            const ctx = new AudioContext();
            if (ctx.state === 'suspended') ctx.resume();
        }

        // Ініціалізуємо розпізнавання мови, якщо ще не створено
        if (!recognition) {
            try {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SpeechRecognition) {
                    resultText.innerText = "🚨 Цей браузер не підтримує розпізнавання голосу.";
                    return;
                }
                recognition = new SpeechRecognition();
                recognition.lang = 'uk-UA';
                recognition.interimResults = false;
                recognition.maxAlternatives = 1;
                setupRecognitionCallbacks();
            } catch (e) {
                resultText.innerText = "Помилка створення ШІ-слуху: " + e.message;
                return;
            }
        }

        if (!gameStarted) {
            gameStarted = true;
            currentStep = 0;
            runGameStep();
        } else {
            startListening();
        }
    }

    function speak(text, callback) {
        if (!synth) {
            if (callback) callback();
            return;
        }
        synth.cancel(); 
        
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'uk-UA';
        
        micButton.classList.remove('listening');
        micButton.classList.add('speaking');
        character.classList.add('bounce');
        
        utterance.onend = () => {
            character.classList.remove('bounce');
            micButton.classList.remove('speaking');
            if (callback) callback();
        };
        
        utterance.onerror = (e) => {
            character.classList.remove('bounce');
            micButton.classList.remove('speaking');
            resultText.innerText = "Помилка звуку: " + e.error;
            if (callback) callback();
        };

        synth.speak(utterance);
    }

    function runGameStep() {
        if (currentStep >= steps.length) {
            bubble.innerText = "Ура! Ми все пройшли! Ти супер! 🌟";
            speak("Ура! Ми все пройшли! Ти супер!");
            gameStarted = false;
            targetImage.innerText = "🌟";
            resultText.innerText = "Перемогу здобуто!";
            return;
        }

        const data = steps[currentStep];
        targetImage.innerText = data.image;
        bubble.innerText = data.question;
        resultText.innerText = "Семик говорить...";
        
        speak(data.question, () => {
            setTimeout(startListening, 500);
        });
    }

    function startListening() {
        if (!recognition) return;
        
        micButton.classList.remove('speaking');
        micButton.classList.add('listening');
        resultText.innerText = "СЛУХАЮ (Говоріть у мікрофон)";
        
        try {
            recognition.start();
        } catch(e) {
            console.log("Рестарт прослуховування");
        }
    }

    function setupRecognitionCallbacks() {
        recognition.onresult = (event) => {
            micButton.classList.remove('listening');
            const speechToText = event.results[0][0].transcript.toLowerCase();
            resultText.innerText = `Почуто: "${speechToText}"`;

            const data = steps[currentStep];
            const isCorrect = data.keywords.some(keyword => speechToText.includes(keyword));

            if (isCorrect) {
                bubble.innerText = "Правильно! 🎉";
                speak("Правильно!", () => {
                    currentStep++;
                    setTimeout(runGameStep, 1000);
                });
            } else {
                bubble.innerText = "Ой, спробуй ще раз? 👀";
                speak("Ой, спробуй ще раз", () => {
                    setTimeout(startListening, 600);
                });
            }
        };

        recognition.onspeechend = () => {
            recognition.stop();
            micButton.classList.remove('listening');
        };

        recognition.onerror = (event) => {
            micButton.classList.remove('listening');
            // Виводимо опис помилки на екран для діагностики
            resultText.innerText = `Помилка мікрофона: [${event.error}]. Натисни знову.`;
        };
    }
</script>

</body>
</html>
