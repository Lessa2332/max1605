<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дракончик Сем — Твій друг!</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
            font-family: 'Comic Sans MS', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        #character {
            font-size: 100px;
            margin: 10px 0;
            transition: transform 0.3s ease;
        }

        .bounce {
            animation: bounce 0.5s infinite alternate;
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-10px); }
        }

        #bubble {
            background: #fff;
            border: 3px solid #6c5ce7;
            border-radius: 20px;
            padding: 15px;
            position: relative;
            margin-bottom: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #2d3436;
        }

        #target-image {
            font-size: 90px;
            background: #dfe6e9;
            width: 160px;
            height: 160px;
            line-height: 160px;
            border-radius: 50%;
            margin: 0 auto 20px auto;
            border: 5px solid #00cec9;
        }

        /* Кнопка-мікрофон */
        .mic-btn {
            background: #10ac84; /* Початковий зелений колір */
            border: none;
            border-radius: 50%;
            width: 95px;
            height: 95px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            outline: none;
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        /* Іконка мікрофона всередині кнопки */
        .mic-btn::before {
            content: "🎤";
            font-size: 40px;
        }

        .mic-btn:active {
            transform: scale(0.9);
        }

        /* Зелений колір, коли Дракончик говорить */
        .speaking {
            background: #10ac84 !important;
        }

        /* Червоний колір + пульсація, коли мікрофон СЛУХАЄ дитину */
        .listening {
            background: #ff6b6b !important;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 107, 107, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(255, 107, 107, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 107, 107, 0); }
        }

        #result-text {
            margin-top: 15px;
            font-size: 1rem;
            color: #57606f;
            height: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="game-container">
    <div id="bubble">Привіт! Натисни на мікрофон і давай грати! 🐉</div>
    <div id="character">🐉</div> 
    
    <div id="target-image">🌟</div>
    
    <button class="mic-btn" id="mic-button" onclick="startGame()"></button>
    <div id="result-text">Натисни, щоб почати</div>
</div>

<script>
    // Розширений сценарій гри: 5 овочів/фруктів, 5 видів транспорту, 5 тваринок
    const steps = [
        // === Категорія: Овочі та Фрукти ===
        { image: "🍎", question: "Що це смачненьке? Це яблуко?", keywords: ["яблуко", "яблучко", "ням", "апл"] },
        { image: "🍌", question: "Ой, а що це жовтеньке? Банан?", keywords: ["банан", "бананчик", "нана"] },
        { image: "🥕", question: "Це заюня любить! Що це? Морква?", keywords: ["морква", "морквина", "морквочка"] },
        { image: "🍅", question: "Який червоний! Що це? Помідор?", keywords: ["помідор", "томат", "помідорчик"] },
        { image: "🍉", question: "Він такий великий! Що це? Кавун?", keywords: ["кавун", "кавунчик"] },

        // === Категорія: Транспорт ===
        { image: "🚗", question: "Поїхали! Що це? Авто?", keywords: ["машина", "бібіка", "авто", "машинка"] },
        { image: "🚂", question: "Чух-чух! Що це їде? Потяг?", keywords: ["потяг", "поїзд", "чух", "туту"] },
        { image: "🚢", question: "Пливе по воді! Що це? Корабель?", keywords: ["корабель", "кораблик", "лодка", "човен"] },
        { image: "✈️", question: "Летять у небі... Що це? Літак?", keywords: ["літак", "літачок"] },
        { image: "🚲", question: "Крутимо педалі! Що це? Велосипед?", keywords: ["велосипед", "ровер", "велик"] },

        // === Категорія: Тваринки ===
        { image: "🐶", question: "Хто це каже гав-гав? Песик?", keywords: ["собака", "песик", "гав", "собачка", "пес"] },
        { image: "🐱", question: "Мяу! Хто це такий пухнастий? Котик?", keywords: ["кіт", "котик", "киця", "мяу", "кошка"] },
        { image: "🐸", question: "Ква-ква! Хто це стрибає? Жабка?", keywords: ["жаба", "жабка", "ква"] },
        { image: "🦁", question: "Рррр! Який грізний! Хто це? Лев?", keywords: ["лев", "левчик", "рр"] },
        { image: "🐻", question: "В лісі живе, мед жує. Хто це? Ведмедик?", keywords: ["ведмідь", "ведмедик", "мишка"] }
    ];

    let currentStep = 0;
    
    const synth = window.speechSynthesis;
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    
    recognition.lang = 'uk-UA';
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;

    const bubble = document.getElementById('bubble');
    const character = document.getElementById('character');
    const targetImage = document.getElementById('target-image');
    const micButton = document.getElementById('mic-button');
    const resultText = document.getElementById('result-text');

    // Функція розмови Семика (Мікрофон стає ЗЕЛЕНИМ)
    function speak(text, callback) {
        synth.cancel();
        const utterance = new SynthesisUtterance ? new SpeechSynthesisUtterance(text) : new SpeechSynthesisUtterance(text);
        utterance.lang = 'uk-UA';
        
        // Перемикаємо кнопку в зелений колір під час мовлення
        micButton.classList.remove('listening');
        micButton.classList.add('speaking');
        character.classList.add('bounce');
        
        utterance.onend = () => {
            character.classList.remove('bounce');
            micButton.classList.remove('speaking');
            if (callback) callback();
        };
        synth.speak(utterance);
    }

    function startGame() {
        if (currentStep >= steps.length) {
            bubble.innerText = "Ура! Ми пройшли всі 15 карток! Ти супер-герой! 🌟";
            speak("Ура! Ми пройшли всі картки! Ти супер герой!");
            currentStep = 0;
            targetImage.innerText = "🌟";
            return;
        }

        const data = steps[currentStep];
        targetImage.innerText = data.image;
        bubble.innerText = data.question;
        resultText.innerText = "Семик говорить...";
        
        speak(data.question, () => {
            startListening();
        });
    }

    // Вмикаємо мікрофон (Стає ЧЕРВОНИМ і пульсує)
    function startListening() {
        micButton.classList.remove('speaking');
        micButton.classList.add('listening');
        resultText.innerText = "ГОВОРИ ТЕПЕР! (Червоний)";
        try {
            recognition.start();
        } catch(e) {
            // Якщо вже запущено
        }
    }

    recognition.onresult = (event) => {
        micButton.classList.remove('listening');
        const speechToText = event.results[0][0].transcript.toLowerCase();
        resultText.innerText = `Почуто: "${speechToText}"`;

        const data = steps[currentStep];
        const isCorrect = data.keywords.some(keyword => speechToText.includes(keyword));

        if (isCorrect) {
            bubble.innerText = "Правильно! Молодець! 🎉";
            speak("Правильно! Молодець!", () => {
                currentStep++;
                setTimeout(startGame, 1000);
            });
        } else {
            bubble.innerText = "Ой, ану подивись уважніше? 👀";
            speak("Ой, ану подивись уважніше", () => {
                setTimeout(startListening, 500);
            });
        }
    };

    recognition.onspeechend = () => {
        recognition.stop();
        micButton.classList.remove('listening');
    };

    recognition.onerror = (event) => {
        micButton.classList.remove('listening');
        resultText.innerText = "Семик не почув, натисни ще раз!";
    };
</script>

</body>
</html>
