<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Кольорові Будиночки — Розвивашка</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1c2e; color: #fff; }

        /* Головний екран */
        #game-screen {
            position: absolute; width: 100%; height: 100%; 
            display: flex; flex-direction: column; justify-content: space-between; align-items: center;
            background: radial-gradient(circle, #2a2d4a 0%, #111322 100%);
            padding: 20px;
        }

        /* Верхня панель з будиночками */
        .houses-container {
            width: 100%; max-width: 600px; display: flex; justify-content: space-around; margin-top: 20px;
        }
        .house {
            width: 90px; height: 110px; border-radius: 15px 15px 10px 10px;
            display: flex; flex-direction: column; justify-content: flex-end; align-items: center;
            padding-bottom: 15px; font-weight: bold; font-size: 14px; position: relative;
            box-shadow: 0 8px 15px rgba(0,0,0,0.3); transition: transform 0.2s ease;
        }
        /* Дах будиночка */
        .house::before {
            content: ''; position: absolute; top: -25px; left: 50%; transform: translateX(-50%);
            border-left: 55px solid transparent; border-right: 55px solid transparent;
            border-bottom: 30px solid currentColor; filter: brightness(0.8);
        }
        .house.bounce { transform: scale(1.25); }

        /* Кольори будиночків */
        .house.red { background: #ff4757; color: #ff4757; }
        .house.blue { background: #1e90ff; color: #1e90ff; }
        .house.yellow { background: #ffa500; color: #ffa500; }
        
        /* Текст всередині будиночка (білий дверний отвір) */
        .door { width: 40px; height: 50px; background: #fff; border-radius: 8px 8px 0 0; }

        /* Середня зона для перемоги */
        .center-zone { flex: 1; display: flex; justify-content: center; align-items: center; width: 100%; }
        #win-msg { font-size: 28px; color: #2ed573; font-weight: bold; text-align: center; display: none; text-shadow: 0 0 10px rgba(46,213,115,0.5); }

        /* Нижня панель для кульок */
        .balls-container {
            width: 100%; max-width: 500px; min-height: 140px;
            background: rgba(255, 255, 255, 0.05); border: 3px dashed #535c68;
            border-radius: 30px; display: flex; justify-content: space-around; align-items: center;
            padding: 10px; margin-bottom: 20px;
        }

        /* Кульки для перетягування */
        .ball {
            width: 75px; height: 75px; border-radius: 50%; cursor: grab; touch-action: none;
            box-shadow: inset -8px -8px 15px rgba(0,0,0,0.2), 0 8px 15px rgba(0,0,0,0.3);
            transition: transform 0.1s;
        }
        .ball:active { cursor: grabbing; transform: scale(1.15); }
        .ball.red { background: #ff4757; border: 4px solid #ff6b81; }
        .ball.blue { background: #1e90ff; border: 4px solid #70a1ff; }
        .ball.yellow { background: #ffa500; border: 4px solid #eccc68; }

        /* Кнопка перезапуску */
        #restart-btn {
            display: none; background: #2ed573; color: white; border: none; 
            padding: 18px 40px; font-size: 22px; font-weight: bold; border-radius: 50px; 
            cursor: pointer; box-shadow: 0 10px 20px rgba(46,213,115,0.4);
            animation: pulse 1.5s infinite; margin-bottom: 40px;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.06); }
            100% { transform: scale(1); }
        }

        /* Конфеті (Салют) */
        .confetti {
            position: absolute; width: 12px; height: 12px; background: #ff4757;
            border-radius: 3px; top: -20px; z-index: 100; animation: fall 3s linear forwards;
        }
        @keyframes fall {
            to { transform: translateY(105vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div id="game-screen">
        <div class="houses-container">
            <div class="house red" id="house-red"><div class="door"></div></div>
            <div class="house blue" id="house-blue"><div class="door"></div></div>
            <div class="house yellow" id="house-yellow"><div class="door"></div></div>
        </div>

        <div class="center-zone">
            <div id="win-msg">УРА! МУДРИЙ МАЛЮК! 🏆🌟</div>
        </div>

        <button id="restart-btn" onclick="resetGame()">ГРАТИ ЗНОВУ 🔄</button>

        <div class="balls-container" id="ballsContainer">
            </div>
    </div>

    <script>
        // --- СИНТЕЗАТОР СИСТЕМНИХ ЗВУКІВ ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playTone(freq, duration, type='sine') {
            try {
                let osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
                osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + duration);
            } catch(e) {}
        }

        const soundDrag = () => playTone(350, 0.08, 'triangle');
        const soundSuccess = () => { playTone(523.25, 0.1); setTimeout(() => playTone(659.25, 0.15), 80); }; // Гарний дзинь
        const soundWrong = () => playTone(180, 0.25, 'sawtooth'); // Помилка
        const soundWin = () => {
            let notes = [523, 587, 659, 698, 784, 880, 987, 1046];
            notes.forEach((n, i) => setTimeout(() => playTone(n, 0.2, 'sine'), i * 80));
        };

        // --- ЛОГІКА ГРИ ---
        const colors = ['red', 'blue', 'yellow'];
        let successCount = 0;

        function initGame() {
            successCount = 0;
            document.getElementById('win-msg').style.display = 'none';
            document.getElementById('restart-btn').style.display = 'none';
            
            const container = document.getElementById('ballsContainer');
            container.style.display = 'flex';
            container.innerHTML = '';

            // Перемішуємо кольори кульок, щоб вони з'являлися випадково
            const shuffledColors = [...colors].sort(() => Math.random() - 0.5);

            shuffledColors.forEach(color => {
                const ball = document.createElement('div');
                ball.className = `ball ${color}`;
                ball.id = `ball-${color}`;
                ball.setAttribute('data-color', color);
                container.appendChild(ball);
            });

            initDragAndDrop();
        }

        function initDragAndDrop() {
            const balls = document.querySelectorAll('.ball');

            balls.forEach(ball => {
                let startX = 0, startY = 0, currentX = 0, currentY = 0;
                const ballColor = ball.getAttribute('data-color');

                ball.addEventListener('touchstart', dragStart);
                ball.addEventListener('mousedown', dragStart);

                function dragStart(e) {
                    audioCtx.resume();
                    soundDrag();
                    let clientX = e.touches ? e.touches[0].clientX : e.clientX;
                    let clientY = e.touches ? e.touches[0].clientY : e.clientY;
                    startX = clientX - currentX; startY = clientY - currentY;
                    
                    document.addEventListener('touchmove', dragMove, { passive: false });
                    document.addEventListener('mousemove', dragMove);
                    document.addEventListener('touchend', dragEnd);
                    document.addEventListener('mouseup', dragEnd);
                }

                function dragMove(e) {
                    e.preventDefault(); // Заборона скролу
                    let clientX = e.touches ? e.touches[0].clientX : e.clientX;
                    let clientY = e.touches ? e.touches[0].clientY : e.clientY;
                    currentX = clientX - startX; currentY = clientY - startY;
                    ball.style.transform = `translate(${currentX}px, ${currentY}px) scale(1.15)`;
                }

                function dragEnd() {
                    document.removeEventListener('touchmove', dragMove);
                    document.removeEventListener('mousemove', dragMove);
                    document.removeEventListener('touchend', dragEnd);
                    document.removeEventListener('mouseup', dragEnd);

                    const ballRect = ball.getBoundingClientRect();
                    const targetHouse = document.getElementById(`house-${ballColor}`);
                    const houseRect = targetHouse.getBoundingClientRect();

                    // Перевіряємо перетин з його правильним будиночком
                    const isCorrectHouse = !(ballRect.right < houseRect.left || ballRect.left > houseRect.right || 
                                             ballRect.bottom < houseRect.top || ballRect.top > houseRect.bottom);

                    // Перевіряємо перетин з БУДЬ-ЯКИМ ІНШИМ будиночком для обробки помилки
                    let hitWrongHouse = false;
                    colors.forEach(c => {
                        if (c !== ballColor) {
                            const wrongHouseRect = document.getElementById(`house-${c}`).getBoundingClientRect();
                            if (!(ballRect.right < wrongHouseRect.left || ballRect.left > wrongHouseRect.right || 
                                  ballRect.bottom < wrongHouseRect.top || ballRect.top > wrongHouseRect.bottom)) {
                                hitWrongHouse = true;
                            }
                        }
                    });

                    if (isCorrectHouse) {
                        // Влучне попадання!
                        soundSuccess();
                        ball.style.display = 'none';
                        targetHouse.classList.add('bounce');
                        setTimeout(() => targetHouse.classList.remove('bounce'), 300);
                        
                        successCount++;
                        checkWin();
                    } else if (hitWrongHouse) {
                        // Малюк помилився будиночком
                        soundWrong();
                        currentX = 0; currentY = 0;
                        ball.style.transform = `translate(0px, 0px)`;
                    } else {
                        // Просто кинув посеред екрана
                        currentX = 0; currentY = 0;
                        ball.style.transform = `translate(0px, 0px)`;
                    }
                }
            });
        }

        function checkWin() {
            if (successCount === colors.length) {
                soundWin();
                document.getElementById('ballsContainer').style.display = 'none';
                document.getElementById('win-msg').style.display = 'block';
                document.getElementById('restart-btn').style.display = 'block';
                spawnConfetti();
            }
        }

        // Святковий салют конфеті
        function spawnConfetti() {
            const confettiColors = ['#ff4757', '#1e90ff', '#ffa500', '#2ed573', '#00adb5'];
            for (let i = 0; i < 40; i++) {
                setTimeout(() => {
                    if (successCount < colors.length) return; // якщо гру вже скинули
                    const c = document.createElement('div');
                    c.className = 'confetti';
                    c.style.left = Math.random() * 100 + 'vw';
                    c.style.background = confettiColors[Math.floor(Math.random() * confettiColors.length)];
                    c.style.transform = `scale(${Math.random() * 0.6 + 0.6})`;
                    c.style.animationDuration = (Math.random() * 1.5 + 1.5) + 's';
                    document.body.appendChild(c);
                    setTimeout(() => c.remove(), 3000);
                }, i * 60);
            }
        }

        function resetGame() {
            // Видаляємо старі конфеті, якщо лишилися
            document.querySelectorAll('.confetti').forEach(c => c.remove());
            initGame();
        }

        // Старт гри
        initGame();
    </script>
</body>
</html>
