<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Магічний Живий Слайм</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #050510; font-family: sans-serif; }

        canvas { display: block; width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }
        
        .hint { 
            position: absolute; top: 5%; left: 50%; transform: translateX(-50%); 
            font-size: 24px; color: #39ff14; text-shadow: 0 0 10px #39ff14; 
            pointer-events: none; text-align: center; font-weight: bold; width: 90%; z-index: 10; 
        }

        /* Елементи-емодзі, які будуть "плавати" всередині слайму */
        .slime-creature {
            position: absolute; font-size: 55px; pointer-events: none; z-index: 5;
            transform: translate(-50%, -50%); transition: transform 0.1s ease;
        }
    </style>
</head>
<body>

    <div class="hint">Пальчиком розділяй і збирай слайм! 🦆🐟🦀</div>
    
    <div class="slime-creature" id="c1">🦆</div>
    <div class="slime-creature" id="c2">🐟</div>
    <div class="slime-creature" id="c3">🦀</div>

    <canvas id="slimeCanvas"></canvas>

    <script>
        // --- СИНТЕЗАТОР ЗВУКІВ ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSlimeSound(freq, duration, type='sine') {
            try {
                let osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
                osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                // Булькаючий ефект (частота швидко падає вниз)
                osc.frequency.exponentialRampToValueAtTime(freq / 2, audioCtx.currentTime + duration);
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + duration);
            } catch(e) {}
        }

        const soundSplash = () => playSlimeSound(300, 0.2, 'triangle'); // Плюх при злитті
        const soundMove = () => playSlimeSound(150, 0.08, 'sine');    // Рух пальця

        // --- НАЛАШТУВАННЯ КАНВАСУ ---
        const canvas = document.getElementById('slimeCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- ФІЗИКА КРАПЕЛЬ (МЕТАБОЛИ) ---
        class Blob {
            constructor(x, y, r, id) {
                this.x = x; this.y = y;
                this.vx = (Math.random() - 0.5) * 3;
                this.vy = (Math.random() - 0.5) * 3;
                this.r = r;
                this.domId = id;
            }
            update(mouse) {
                // Взаємодія з пальцем/мишкою (відштовхування або розганяння)
                let dx = this.x - mouse.x;
                let dy = this.y - mouse.y;
                let dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < 180 && mouse.down) {
                    let force = (180 - dist) * 0.08;
                    this.vx += (dx / dist) * force;
                    this.vy += (dy / dist) * force;
                    if (Math.random() < 0.15) soundMove();
                }

                // Рух краплі
                this.x += this.vx; this.y += this.vy;
                this.vx *= 0.95; this.vy *= 0.95; // тертя, щоб слайм зупинявся

                // Відбивання від стінок екрану
                if (this.x < this.r) { this.x = this.r; this.vx *= -1; }
                if (this.x > width - this.r) { this.x = width - this.r; this.vx *= -1; }
                if (this.y < this.r) { this.y = this.r; this.vy *= -1; }
                if (this.y > height - this.r) { this.y = height - this.r; this.vy *= -1; }

                // Прив'язка емодзі-тваринки до центру краплі
                if (this.domId) {
                    const el = document.getElementById(this.domId);
                    if (el) {
                        el.style.left = `${this.x}px`;
                        el.style.top = `${this.y}px`;
                    }
                }
            }
        }

        // Створюємо 3 великі краплі з тваринками всередині
        const blobs = [
            new Blob(window.innerWidth * 0.25, window.innerHeight * 0.5, 90, 'c1'),
            new Blob(window.innerWidth * 0.50, window.innerHeight * 0.4, 85, 'c2'),
            new Blob(window.innerWidth * 0.75, window.innerHeight * 0.5, 95, 'c3')
        ];

        // Додамо ще кілька маленьких крапель без тваринок для більшої "рідкості" слайму
        for(let i=0; i<4; i++) {
            blobs.push(new Blob(Math.random()*width, Math.random()*height, 50, null));
        }

        let mouse = { x: -1000, y: -1000, down: false };
        let lastMergedState = false; // для фіксації моменту злиття крапель

        // --- ГОЛОВНИЙ ЦИКЛ РЕНДЕРУ (МАТЕМАТИКА СЛАЙМУ) ---
        function loop() {
            // Оновлюємо фізику крапель
            blobs.forEach(b => b.update(mouse));

            // Очищення екрану
            ctx.fillStyle = '#050510';
            ctx.fillRect(0, 0, width, height);

            // Створюємо ефект рідкого слайму через попіксельний фільтр або математичне поле сили (Metaballs)
            // Для швидкої роботи на мобільних телефонах малюємо краплі з розмитими радіальними градієнтами, а потім відсікаємо альфа-канал
            let imageData = ctx.getImageData(0, 0, width, height);
            
            // Натомість використаємо супер-ефект порогу яскравості прямо в Canvas за допомогою вбудованого розмиття
            ctx.filter = 'blur(30px) contrast(40)'; // Ось вона — магія злиття!
            
            // Малюємо основу слайму неоновим зеленим або бірюзовим кольором
            ctx.fillStyle = '#39ff14'; // Неоновий зелений слайм
            blobs.forEach(b => {
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
                ctx.fill();
            });

            // Скидаємо фільтр, щоб емодзі та текст не розмивалися
            ctx.filter = 'none';

            // Перевіряємо, чи зблизилися великі краплі (чи відбулося злиття) для відтворення звуку "плюх"
            let closeCount = 0;
            for (let i = 0; i < 3; i++) {
                for (let j = i + 1; j < 3; j++) {
                    let dx = blobs[i].x - blobs[j].x;
                    let dy = blobs[i].y - blobs[j].y;
                    if (Math.sqrt(dx*dx + dy*dy) < 180) closeCount++;
                }
            }
            let currentlyMerged = closeCount > 0;
            if (currentlyMerged && !lastMergedState) {
                soundSplash(); // Тільки в момент дотику робимо "бульк!"
            }
            lastMergedState = currentlyMerged;

            requestAnimationFrame(loop);
        }

        // --- ОБРОБКА ДУТИКІВ (ТАЧ-ПОДІЇ) ---
        function setMouse(e) {
            audioCtx.resume();
            let clientX = e.touches ? e.touches[0].clientX : e.clientX;
            let clientY = e.touches ? e.touches[0].clientY : e.clientY;
            mouse.x = clientX;
            mouse.y = clientY;
        }

        window.addEventListener('mousedown', (e) => { mouse.down = true; setMouse(e); });
        window.addEventListener('mousemove', setMouse);
        window.addEventListener('mouseup', () => mouse.down = false);

        window.addEventListener('touchstart', (e) => { mouse.down = true; setMouse(e); });
        window.addEventListener('touchmove', (e) => { e.preventDefault(); setMouse(e); }, { passive: false });
        window.addEventListener('touchend', () => mouse.down = false);

        loop();
    </script>
</body>
</html>
