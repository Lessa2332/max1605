<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дракончик Сем — Твій друг!</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
            font-family: 'Comic Sans MS', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        #character {
            font-size: 100px;
            margin: 10px 0;
            transition: transform 0.3s ease;
        }

        .bounce {
            animation: bounce 0.5s infinite alternate;
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-10px); }
        }

        #bubble {
            background: #fff;
            border: 3px solid #6c5ce7;
            border-radius: 20px;
            padding: 15px;
            position: relative;
            margin-bottom: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #2d3436;
        }

        #target-image {
            font-size: 80px;
            background: #dfe6e9;
            width: 150px;
            height: 150px;
            line-height: 150px;
            border-radius: 50%;
            margin: 0 auto 20px auto;
            border: 5px solid #00cec9;
        }

        .mic-btn {
            background: #10ac84;
            border: none;
            border-radius: 50%;
            width: 90px;
            height: 90px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: all 0.2s;
            outline: none;
        }

        .mic-btn:active {
            transform: scale(0.9);
        }

        .listening {
            background: #ff6b6b;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 107, 107, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(255, 107, 107, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 107, 107, 0); }
        }

        #result-text {
            margin-top: 15px;
            font-size: 1rem;
            color: #57606f;
            height: 20px;
        }
    </style>
</head>
<body>

<div class="game-container">
    <div id="bubble">Привіт! Натисни кнопку і давай грати! 🐉</div>
    <!-- Поки що замість 3D-моделі використовуємо емодзі для швидкості -->
    <div id="character">🐉</div> 
    
    <div id="target-image">🚗</div>
    
    <button class="mic-btn" id="mic-button" onclick="startGame()"></button>
    <div id="result-text">Натисни, щоб Семик заговорив</div>
</div>

<script>
    // Сценарій гри: що показуємо, що запитуємо, які правильні ключові слова чекаємо
    const steps = [
        { image: "🚗", question: "Що це? Це машина?", keywords: ["машина", "бібіка", "авто"] },
        { image: "🐶", question: "А це хто? Гав-гав?", keywords: ["собака", "песик", "гав", "собачка"] },
        { image: "🍎", question: "Яке смачне! Що це?", keywords: ["яблуко", "яблучко", "ням"] }
    ];

    let currentStep = 0;
    
    // Ініціалізація синтезу мовлення (ШІ говорить)
    const synth = window.speechSynthesis;
    // Ініціалізація розпізнавання мовлення (ШІ слухає)
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    
    recognition.lang = 'uk-UA'; // Налаштовуємо на українську мову
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;

    const bubble = document.getElementById('bubble');
    const character = document.getElementById('character');
    const targetImage = document.getElementById('target-image');
    const micButton = document.getElementById('mic-button');
    const resultText = document.getElementById('result-text');

    // Функція, щоб Дракончик заговорив
    function speak(text, callback) {
        synth.cancel(); // Зупиняємо попередній голос, якщо він був
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'uk-UA';
        
        character.classList.add('bounce'); // Сем рухається, коли говорить
        
        utterance.onend = () => {
            character.classList.remove('bounce');
            if (callback) callback();
        };
        synth.speak(utterance);
    }

    // Логіка старту або переходу на новий крок
    function startGame() {
        if (currentStep >= steps.length) {
            bubble.innerText = "Ура! Ми все пройшли! Ти молодець! 🌟";
            speak("Ура! Ми все пройшли! Ти молодець!");
            currentStep = 0; // Скидаємо гру
            return;
        }

        const data = steps[currentStep];
        targetImage.innerText = data.image;
        bubble.innerText = data.question;
        
        // Спочатку Сем задає питання, а потім автоматично вмикається мікрофон
        speak(data.question, () => {
            startListening();
        });
    }

    // Вмикаємо мікрофон
    function startListening() {
        micButton.classList.add('listening');
        resultText.innerText = "Семик слухає...";
        recognition.start();
    }

    // Обробка того, що сказала дитина
    recognition.onresult = (event) => {
        micButton.classList.remove('listening');
        const speechToText = event.results[0][0].transcript.toLowerCase();
        resultText.innerText = `Почуто: "${speechToText}"`;

        const data = steps[currentStep];
        // Перевіряємо, чи є сказане слово в списку очікуваних ключів
        const isCorrect = data.keywords.some(keyword => speechToText.includes(keyword));

        if (isCorrect) {
            bubble.innerText = "Правильно! Супер! 🎉";
            speak("Правильно! Супер!", () => {
                currentStep++;
                setTimeout(startGame, 1000); // Перехід до наступного через секунду
            });
        } else {
            bubble.innerText = "Ой, спробуй ще раз! Дивись уважно 👀";
            speak("Ой, спробуй ще раз! Дивись уважно", () => {
                setTimeout(startListening, 500); // Даємо ще шанс
            });
        }
    };

    // Якщо дитина промовчала
    recognition.onspeechend = () => {
        recognition.stop();
        micButton.classList.remove('listening');
    };

    recognition.onerror = (event) => {
        micButton.classList.remove('listening');
        resultText.innerText = "Не почула, натисни кнопку знову.";
    };
</script>

</body>
</html>
