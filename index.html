<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Кольорові З'єднання — Самодостатня Гра</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #0d001a; font-family: 'Segoe UI', Roboto, sans-serif; overflow: hidden; user-select: none; }
        
        /* Сучасний ігровий інтерфейс */
        #topbar {
            position: absolute; top: 15px; left: 15px; right: 15px;
            height: 70px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(20, 10, 35, 0.85); border-radius: 15px; padding: 0 25px;
            box-shadow: 0 4px 20px rgba(138, 43, 226, 0.4); border: 1px solid rgba(255,255,255,0.1); z-index: 10;
        }
        .ui-element { color: white; display: flex; flex-direction: column; align-items: center; }
        .ui-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #b39ddb; margin-bottom: 2px; }
        .ui-value { font-size: 22px; font-weight: bold; color: #fff; }
        
        #game-scene { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        /* Повідомлення про перемогу в раунді */
        #win-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(13, 0, 26, 0.8); z-index: 20; display: flex;
            justify-content: center; align-items: center; flex-direction: column;
            opacity: 0; pointer-events: none; transition: opacity 0.5s ease;
        }
        #win-overlay.active { opacity: 1; pointer-events: auto; }
        #win-box { background: linear-gradient(135deg, #4a148c, #311b92); padding: 30px 50px; border-radius: 20px; text-align: center; color: white; box-shadow: 0 0 30px #8e24aa; }
        #win-box h2 { margin: 0 0 10px 0; font-size: 28px; }
        #win-box button { background: #00e676; border: none; padding: 12px 30px; font-size: 16px; font-weight: bold; color: #004d40; border-radius: 25px; cursor: pointer; margin-top: 15px; box-shadow: 0 5px 15px rgba(0,230,118,0.4); }
    </style>
</head>
<body>

    <div id="topbar">
        <div class="ui-element">
            <span class="ui-label">Раунд</span>
            <span id="round-val" class="ui-value">1</span>
        </div>
        <div class="ui-element">
            <span class="ui-label">Рахунок</span>
            <span id="score-val" class="ui-value">0</span>
        </div>
        <div class="ui-element">
            <span class="ui-label">Ходи</span>
            <span id="moves-val" class="ui-value">0</span>
        </div>
    </div>

    <div id="win-overlay">
        <div id="win-box">
            <h2>Раунд пройдено!</h2>
            <p>Всі кольори успішно з'єднані.</p>
            <button onclick="nextRound()">Наступний рівень</button>
        </div>
    </div>

    <a-scene id="game-scene" embedded vr-mode-ui="enabled: false" cursor="rayOrigin: mouse" raycaster="objects: .clickable">
        
        <a-entity camera look-controls="enabled: false" position="0 2.8 2.2" rotation="-50 0 0"></a-entity>
        
        <a-light type="ambient" color="#4a3b63" intensity="0.8"></a-light>
        <a-light type="directional" position="2 4 1" color="#ffffff" intensity="0.8"></a-light>

        <a-entity id="stage" position="0 0 0">
            
            <a-cylinder 
                id="game-prism"
                position="0 0.4 0" 
                radius="1.3" 
                height="1.2" 
                segments-radial="6" 
                material="color: #f5f5f7; roughness: 0.5; metalness: 0.1;">
            </a-cylinder>

            <a-entity id="nodes-container"></a-entity>
            <a-entity id="lines-container"></a-entity>

            <a-sky color="#090115"></a-sky>
        </a-entity>

    </a-scene>

    <script>
        // Конфігурація гри
        const COLORS = [
            { name: 'red', hex: '#ff1744' },
            { name: 'blue', hex: '#2979ff' },
            { name: 'green', hex: '#00e676' },
            { name: 'yellow', hex: '#ffea00' }
        ];

        let gameState = {
            score: 0,
            moves: 0,
            currentRound: 1,
            selectedNode: null,
            connectionsCount: 0,
            activeRoundColors: []
        };

        // Логіка генерації випадкових неповторних позицій на площині призми
        function generateRandomPositions(count) {
            const positions = [];
            const minDistance = 0.35; // Щоб кульки не злипалися

            while (positions.length < count) {
                // Генеруємо випадкові полярні координати всередині радіусу призми (r < 1.1)
                let angle = Math.random() * Math.PI * 2;
                let r = 0.3 + Math.random() * 0.75; 
                
                let x = Math.cos(angle) * r;
                let z = Math.sin(angle) * r;
                
                // Перевірка на відпуст від уже створених точок
                let valid = true;
                for (let pos of positions) {
                    let dist = Math.sqrt((x - pos.x)**2 + (z - pos.z)**2);
                    if (dist < minDistance) {
                        valid = false;
                        break;
                    }
                }
                if (valid) positions.push({x: x, z: z});
            }
            return positions;
        }

        // Ініціалізація або перезапуск раунду
        function initRound() {
            const nodesContainer = document.getElementById('nodes-container');
            const linesContainer = document.getElementById('lines-container');
            
            // Очищаємо попередній раунд
            nodesContainer.innerHTML = '';
            linesContainer.innerHTML = '';
            gameState.selectedNode = null;
            gameState.connectionsCount = 0;

            document.getElementById('round-val').innerText = gameState.currentRound;

            // Створюємо масив пар для 4 кольорів (разом 8 кульок)
            let roundPairs = [];
            COLORS.forEach(color => {
                roundPairs.push({ id: color.name + '_1', color: color });
                roundPairs.push({ id: color.name + '_2', color: color });
            });

            // Генеруємо унікальні випадкові координати для кожної з 8 кульок
            let coords = generateRandomPositions(8);

            // Рендеримо кульки в 3D просторі поверх призми (Y = 1.02)
            roundPairs.forEach((pair, index) => {
                let sphere = document.createElement('a-sphere');
                sphere.setAttribute('id', pair.id);
                sphere.setAttribute('class', 'clickable');
                sphere.setAttribute('position', `${coords[index].x} 1.02 ${coords[index].z}`);
                sphere.setAttribute('radius', '0.09');
                sphere.setAttribute('color', pair.color.hex);
                sphere.setAttribute('material', 'roughness: 0.3; metalness: 0.2');
                
                // Зберігаємо дані кольору прямо в об'єкті
                sphere.dataset.colorName = pair.color.name;
                sphere.dataset.hex = pair.color.hex;
                sphere.dataset.connected = "false";

                // Додаємо подію кліку через архітектуру A-Frame/JS
                sphere.addEventListener('click', function(e) {
                    handleNodeClick(sphere);
                });

                nodesContainer.appendChild(sphere);
            });
        }

        // Обробка кліків на вузли
        function handleNodeClick(clickedNode) {
            if (clickedNode.dataset.connected === "true") return;

            // Якщо це перший клік раунду або вибір нового кольору
            if (!gameState.selectedNode) {
                gameState.selectedNode = clickedNode;
                // Візуальний ефект вибору (збільшення пульсації)
                clickedNode.setAttribute('animation', 'property: scale; to: 1.3 1.3 1.3; dur: 200; easing: easeOutQuad');
                return;
            }

            // Якщо клікнули на ту саму кульку — скасовуємо вибір
            if (gameState.selectedNode.id === clickedNode.id) {
                resetSelection();
                return;
            }

            gameState.moves++;
            document.getElementById('moves-val').innerText = gameState.moves;

            // Перевірка збігу кольорів
            if (gameState.selectedNode.dataset.colorName === clickedNode.dataset.colorName) {
                // Кольори збіглися! Малюємо 3D міст (лінію)
                draw3DConnection(gameState.selectedNode, clickedNode);
                
                gameState.selectedNode.dataset.connected = "true";
                clickedNode.dataset.connected = "true";
                
                gameState.connectionsCount++;
                gameState.score += 25;
                document.getElementById('score-val').innerText = gameState.score;

                resetSelection();

                // Перевірка на завершення всього раунду
                if (gameState.connectionsCount === COLORS.length) {
                    setTimeout(() => {
                        document.getElementById('win-overlay').classList.add('active');
                    }, 600);
                }
            } else {
                // Помилка: кольори різні. Скидаємо вибір
                resetSelection();
            }
        }

        function resetSelection() {
            if (gameState.selectedNode) {
                gameState.selectedNode.setAttribute('scale', '1 1 1');
                gameState.selectedNode = null;
            }
        }

        // Динамічне малювання тривимірної лінії між двома кульками
        function draw3DConnection(nodeA, nodeB) {
            const linesContainer = document.getElementById('lines-container');
            
            let posA = nodeA.getAttribute('position');
            let posB = nodeB.getAttribute('position');
            let colorHex = nodeA.dataset.hex;

            // Створюємо циліндр як об'ємну лінію
            let lineContainer = document.createElement('a-entity');
            
            // Розрахунок математики для розміщення циліндра точно між двома точками у просторі
            let dx = posB.x - posA.x;
            let dz = posB.z - posA.z;
            let distance = Math.sqrt(dx*dx + dz*dz);
            
            // Позиція центру лінії
            let midX = (posA.x + posB.x) / 2;
            let midZ = (posA.z + posB.z) / 2;
            
            // Кут повороту циліндра
            let angle = Math.atan2(dz, dx) * (180 / Math.PI);

            let pipe = document.createElement('a-cylinder');
            pipe.setAttribute('position', `${midX} 1.01 ${midZ}`);
            pipe.setAttribute('rotation', `90 ${-angle} 0`);
            pipe.setAttribute('radius', '0.035'); // Товщина ліній як на референсі
            pipe.setAttribute('height', distance);
            pipe.setAttribute('color', colorHex);
            pipe.setAttribute('material', 'roughness: 0.4; emissive: ' + colorHex + '; emissiveIntensity: 0.2');

            // Красива анімація появи (лінія плавно масштабується в довжину)
            pipe.setAttribute('scale', '1 0.01 1');
            pipe.setAttribute('animation', `property: scale; to: 1 1 1; dur: 350; easing: easeOutCubic`);

            linesContainer.appendChild(pipe);
        }

        // Перехід до наступного раунду
        function nextRound() {
            document.getElementById('win-overlay').classList.remove('active');
            gameState.currentRound++;
            initRound();
        }

        // Очікування завантаження 3D-рушія
        document.querySelector('a-scene').addEventListener('loaded', function () {
            initRound();
        });
    </script>
</body>
</html>
